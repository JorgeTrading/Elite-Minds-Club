<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Elite Minds Club</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  background: #111;
}

.logo img {
  height: 60px;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

/* HERO */
header {
  text-align: center;
  padding: 80px 20px;
}

h1 {
  font-size: 50px;
}

.btn {
  background: #00ff88;
  color: black;
  padding: 15px 30px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  background: #00cc6a;
}

/* CARDS */
.section {
  padding: 50px 20px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #111;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  width: 250px;
  box-shadow: 0 0 15px rgba(0,255,136,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* ANIMACIÓN */
.grafica {
  height: 120px;
  margin-top: 40px;
  background: linear-gradient(to right, #00ff88, transparent);
  animation: grow 2s infinite alternate;
}

@keyframes grow {
  from {transform: scaleX(0.3);}
  to {transform: scaleX(1);}
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: #888;
}
</style>

</head>

<body>

<nav>
  <div class="logo">
    <a href="#">
      <img src="logo.png" alt="Elite Minds Club">
    </a>
  </div>
  <div>
    <a href="#">Inicio</a>
    <a href="#">Videos</a>
    <a href="#">Comunidad</a>
  </div>
</nav>

<header>
  <h1>Elite Minds Club</h1>
  <p>Disciplina. Mejora. Futuro.</p>
  <a class="btn" href="https://discord.com" target="_blank">Unirse a la comunidad</a>
</header>

<section class="section">
  <h2>🔥 Qué es esto</h2>
  <div class="cards">
    <div class="card">
      <h3>📈 Mentalidad</h3>
      <p>Mejorar cada día.</p>
    </div>
    <div class="card">
      <h3>🎯 Objetivos</h3>
      <p>Metas claras.</p>
    </div>
    <div class="card">
      <h3>🤝 Comunidad</h3>
      <p>Apoyo real.</p>
    </div>
  </div>
</section>

<div class="grafica"></div>

<footer>
  <p>© 2026 Elite Minds Club</p>
</footer>

</body>
</html>
<div class="logo">
  <img src="logo.png" alt="Elite Minds Club" style="height:60px; filter: drop-shadow(0 0 10px #00ff88);">
</div>
